<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RADIO</title>
    <!-- <link rel="stylesheet" href="css/style.css"> -->
    <style>

main{
    width: 360px;
    position: absolute;
    left:50% ;
    transform: translateX(-50%);
}
header img{
    width: 100px;
    margin-top: 20px;
    border-radius: 50%;
}
header{
    text-align: center;
    color: white;
    height: 300px;
}
h1{
    font-size: 38px;
    margin: 12px 0px;
}
#content{
    background-color:whitesmoke;
}
header p{
    font-size: 22px;
}
#buttons{
    display: flex;
    justify-content: center;
    
}
#buttons img{
    margin-top: 20px;
    width: 40px;
    padding:0px 12px;
}
#volume{
    text-align: center;
}
#volume input{
width: 100%;
}
input[type="range" i]{
    -webkit-appearance: none;
    background: #e6e7e8;
    height: 4px;
    margin: 0px;
}
input[type=range]::-webkit-slider-thumb{
    -webkit-appearance: none;
    background: rgb(228, 104, 104);
    height: 25px;
    width: 25px;
    border-radius: 50%;
}
h2{
    margin: 12px 0px;
}
#color{
    text-align: center;
    margin: 40px;
}
#color button{
    height: 25px;
    width: 25px;
    border-radius: 50%;
    border: none;
}
#color1{
    background:rgba(39,39,37,1) ;
}
#color2{
    background:linear-gradient(to right , #ff9966 , #ff5e62) ;
}
#color3{
    background :#ff9966 ;
}
#color4{
    background:rgb(61, 141, 210) ;
}
    </style>
</head>
<body>

    <main id="player">
    <header>
        <img src="img/Logo_Raduo.jpeg" />
        <h1>LIVE RADIO</h1>
        <p id="title_radio">radio</p>
    </header>
    <div id="content">
        <article id="buttons">
        <img src="img/back.png" id="back"/>
        <img src="img/play.png" id="player_pause"/>
        <img src="img/next.png" id="next"/>
        <audio src="./ii.m4a" id="audio_file"></audio>
        </article>
        <article id="volume">
            <h2>الصوت</h2>
            <input id="volume_range" type="range"/>
            <h2>السرعه</h2>
            <input id="volume_speed" type="range" max="200" min="0"/>
        </article>
        <article id="color">
            <button id="color1"></button>
            <button id="color2"></button>
            <button id="color3"></button>
            <button id="color4"></button>
        </article>

    </div>
    </main>
    <script>
            class Player {
      constructor() {
        const he = document.getElementById("player");
        he.style.height = window.innerHeight + "px";
        if (window.innerWidth < 500) {
          he.style.width = window.innerWidth + "px";
        }
        const hediv = document.getElementById("content");
        hediv.style.height = (window.innerHeight - 300) + "px";
      }
    }

//===============
// class button =
//===============
class Buttons{
    constructor(){
        this.audio_file = document.getElementById("audio_file");
        this.title_radio = document.getElementById("title_radio");
        this.player_pause_button = document.getElementById("player_pause");
        this.isplayer = false ;
        this.player_pause_button.addEventListener("click",()=>{
        this.play_pause();
        });
        this.name_radio =[];
        this.name_radio[0]="اذاعة القران الكريم من القاهرة";
        this.name_radio[1]="إذاعة الرقية الشرعية";
        this.name_radio[2]="اذاعة القران الكريم السعودية مباشر";

        this.name_audio =[];
        this.name_audio[0]="https://stream.radiojar.com/8s5u5tpdtwzuv";
        this.name_audio[1]="https://qurango.net/radio/roqiah";
        this.name_audio[2]="https://stream.radiojar.com/4wqre23fytzuv";
        this.server = 0 ;
        this.setResource();
        document.getElementById("next").addEventListener("click",()=>{
            if(this.server<this.name_audio.length-1){
                ++this.server;
                this.isplayer = false ;

            }else{
                this.server=0;
                this.isplayer = false ;
            }
            localStorage.setItem("SAVE_POSEITION",this.server);
            this.setResource();

        });
        document.getElementById("back").addEventListener("click",()=>{
            if(this.server>0){
                --this.server;
                this.isplayer = false ;

            }else{
                this.server=this.name_audio.length-1;
                this.isplayer = false ;
            }
            localStorage.setItem("SAVE_POSEITION",this.server);
            this.setResource();

        });
        this.play_pause();
        
    }
    play_pause(){
        if(this.isplayer ==false){
           this.audio_file.play(); 
           this.player_pause_button.src= "./img/pause.png"
           this.isplayer =true;

        }else{
           this.audio_file.pause();
           this.player_pause_button.src= "./img/play.png"
           this.isplayer = false;  
        }


        
        }
        setResource(){
            if(localStorage.getItem("SAVE_POSEITION")!=null){
                this.server =localStorage.getItem("SAVE_POSEITION");

            }
            this.audio_file.src = this.name_audio[this.server];
            this.title_radio.innerHTML = this.name_radio[this.server];
            this.play_pause();
       }
}


class Volume{
    constructor(){
        this.audio_fil = document.getElementById("audio_file");
        this.audio_fil.volume = 50/100;
        this.volume_range =document.getElementById("volume_range");
        this.volume_range.addEventListener("change",()=>{
        this.audio_fil.volume = this.volume_range.value/100;  
        });

        this.volume_speed =document.getElementById("volume_speed");
        this.volume_speed.playbackRate =1;
        this.volume_speed.addEventListener("change",()=>{
        this.audio_fil.playbackRate = this.volume_speed.value /100;  
        });
    }

}
class Color{
    constructor(){
        this.color1 = document.getElementById("color1");
        this.color1.addEventListener("click",()=>{
            this.select_color("color1");
        });
        this.color2 = document.getElementById("color2");
        this.color2.addEventListener("click",()=>{
            this.select_color("color2");
        });
        this.color3 = document.getElementById("color3");
        this.color3.addEventListener("click",()=>{
            this.select_color("color3");
        });
        this.color4 = document.getElementById("color4");
        this.color4.addEventListener("click",()=>{
            this.select_color("color4");
        });
        if(localStorage.getItem("COLOR")==null){
            document.body.style.background = "linear-gradient(to right , #ff9966 , #ff5e62)";

        }
        this.select_color(localStorage.getItem("COLOR"));
    }
    select_color(color){
        if(color ==="color1"){
            document.body.style.background = "rgba(39,39,37,1)";
        }else if(color ==="color2"){
            document.body.style.background = "linear-gradient(to right , #ff9966 , #ff5e62)";
        }else if(color ==="color3"){
            document.body.style.background ="#ff9966";
        }else if(color ==="color4"){
            document.body.style.background = "rgb(61, 141, 210)";
        }
        localStorage.setItem("COLOR",color);
        
        
        
    }
}
window.onload = function(){
    new Player();
    new Buttons();
    new Volume();
    new Color();
};

    </script>
    <!-- <script src="lavascrpt/volume.js"></script> -->
</body>
</html>
